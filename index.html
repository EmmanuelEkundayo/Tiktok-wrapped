<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Wrapped 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app-root">
        <!-- Progress Bar -->
        <div id="progress-container"></div>

        <!-- Slides Container -->
        <div id="slides-viewport">
            <!-- Slides will be injected or toggled here -->
        </div>

        <!-- Tap zones for navigation -->
        <div id="tap-zones">
            <div id="tap-left"></div>
            <div id="tap-right"></div>
        </div>

        <!-- Credit footer -->
        <footer id="developer-credit">developed by indaCODEski</footer>
    </div>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
